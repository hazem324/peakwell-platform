version: '3.9'

services:

  # ── MySQL ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: peakwell-mysql
    environment:
      MYSQL_ROOT_PASSWORD: peakwell
      MYSQL_DATABASE: peakwell
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppeakwell"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Keycloak ───────────────────────────────────────────────────────
  keycloak:
    image: hazem231/peakwell-keycloak:1.2
    container_name: peakwell-keycloak
    command: start-dev --import-realm
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8180
      KC_HOSTNAME_STRICT: "true"
    ports:
      - "8180:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── AI: Risk/Booking (port 8001) ───────────────────────────────────
  ai-ml:
    build:
      context: E:\PeakWell-Back\PI-Cloud-Backend\ml
    image: oussamaghalioun/peakwell-ai-ml:latest
    container_name: peakwell-ai-ml
    ports:
      - "8001:8001"

  # ── AI: Symptom/Disease (port 8002) ────────────────────────────────
  ai-symptom:
    build:
      context: C:\Users\omarg\PycharmProjects\SymtomAI
    image: oussamaghalioun/peakwell-ai-symptom:latest
    container_name: peakwell-ai-symptom
    ports:
      - "8002:8002"

  # ── AI: Nutrition/Allergen (port 8003) ─────────────────────────────
  ai-nutrition:
    build:
      context: E:\achref-ai\PI-Cloud-Nutrition-Management-Module-AI
    image: oussamaghalioun/peakwell-ai-nutrition:latest
    container_name: peakwell-ai-nutrition
    ports:
      - "8003:8003"

  # ── AI: Sport Events (port 8004) ───────────────────────────────────
  ai-sport:
    build:
      context: E:\adem-ai\IA_PI
    image: oussamaghalioun/peakwell-ai-sport:latest
    container_name: peakwell-ai-sport
    ports:
      - "8004:8004"
    volumes:
      - ai-sport-data:/app

  # ── Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: E:\PeakWell-Back\PI-Cloud-Backend
    image: oussamaghalioun/peakwell-backend:latest
    container_name: peakwell-backend
    ports:
      - "8090:8090"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/peakwell?createDatabaseIfNotExist=true&zeroDateTimeBehavior=convertToNull
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: peakwell

      # Keycloak
      # ISSUER_URI  = must match the 'iss' claim in JWT tokens (browser hits localhost:8180)
      # JWK_SET_URI = where the backend fetches public keys (internal docker network)
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8180
      KEYCLOAK_REALM: peakwell
      KEYCLOAK_CLIENT_ID: spring-client
      KEYCLOAK_CLIENT_SECRET: g6PZR6A8vNOoW7MOYzJ8pCH4UUox77xi
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/peakwell
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/peakwell/protocol/openid-connect/certs

      # App URLs
      APP_FRONTEND_URL: http://localhost
      APP_PUBLIC_URL: http://localhost:8090/peakwell
      APP_VERIFY_EMAIL_REDIRECT_URL: http://localhost/auth/login

      SPRING_JPA_SHOW_SQL: "false"

      # AI microservices — internal docker network
      PEAKWELL_AI_ML_URL: http://ai-ml:8001
      PEAKWELL_AI_SYMPTOM_URL: http://ai-symptom:8002
      PEAKWELL_AI_NUTRITION_URL: http://ai-nutrition:8003
      PEAKWELL_AI_SPORT_URL: http://ai-sport:8004
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
      ai-ml:
        condition: service_started
      ai-symptom:
        condition: service_started
      ai-nutrition:
        condition: service_started
      ai-sport:
        condition: service_started

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: E:\PeakWell-Front\PI-Cloud-Frontend
      args:
        BACKEND_URL: http://localhost
        AI_EVENTS_URL: http://localhost/ai-events
    image: oussamaghalioun/peakwell-frontend:latest
    container_name: peakwell-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  keycloak-data:
  uploads:
  ai-sport-data:
