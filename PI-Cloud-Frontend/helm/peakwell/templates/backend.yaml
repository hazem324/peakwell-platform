apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: {{ include "peakwell.namespace" . }}
  labels:
    {{- include "peakwell.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.backend.storageClass }}
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.backend.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "peakwell.namespace" . }}
  labels:
    {{- include "peakwell.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      hostAliases:
        - ip: {{ .Values.backend.nipIp | quote }}
          hostnames:
            - {{ printf "%s.nip.io" .Values.backend.nipIp | quote }}
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: peakwell-config
            - secretRef:
                name: peakwell-secrets
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "peakwell.namespace" . }}
  labels:
    {{- include "peakwell.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
    - port: 8090
      targetPort: 8090
