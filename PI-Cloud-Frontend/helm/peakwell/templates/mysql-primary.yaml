## ── MySQL Primary ConfigMap (binary logging for replication) ───────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-primary-config
  namespace: {{ include "peakwell.namespace" . }}
  labels:
    {{- include "peakwell.labels" . | nindent 4 }}
data:
  my.cnf: |
    [mysqld]
    server-id        = 1
    log-bin          = mysql-bin
    binlog-format    = ROW
    sync-binlog      = 1
---
## ── MySQL Primary StatefulSet ───────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: {{ include "peakwell.namespace" . }}
  labels:
    {{- include "peakwell.labels" . | nindent 4 }}
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        db-role: active
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          args:
            - --defaults-extra-file=/etc/mysql/conf.d/my.cnf
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: peakwell-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: peakwell
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d/my.cnf
              subPath: my.cnf
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root",
                        "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root",
                        "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: mysql-primary-config
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        storageClassName: {{ .Values.mysql.storageClass }}
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.mysql.storage }}
---
## ── MySQL Primary Service (headless, selector switches on failover) ─────────
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: {{ include "peakwell.namespace" . }}
  labels:
    {{- include "peakwell.labels" . | nindent 4 }}
spec:
  selector:
    app: mysql
    db-role: active
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
