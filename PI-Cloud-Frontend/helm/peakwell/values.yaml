# ── Public access ───────────────────────────────────────────────────────────
# The IP or hostname that external browsers use to reach the cluster.
# Example: 192.168.1.197.nip.io  or  peakwell.nutrition
publicHost: "192.168.1.183.nip.io"

ingress:
  host: "192.168.1.183.nip.io"   # hostname used in Ingress rule

keycloak:
  # Full public URL browsers use for OAuth redirects (include port if NodePort)
  publicUrl: "http://192.168.1.183.nip.io:30180"
  nodePort: 30180
  image: "hazem231/peakwell-keycloak:1.2"
  storage: "1Gi"

# ── MySQL ───────────────────────────────────────────────────────────────────
mysql:
  image: "mysql:8.0"
  storage: "5Gi"
  storageClass: "local-path"
  replicatorPassword: "replicatorpass"

