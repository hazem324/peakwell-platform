apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: peakwell
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        db-role: active
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --defaults-extra-file=/etc/mysql/conf.d/my.cnf
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: peakwell-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: peakwell
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d/my.cnf
              subPath: my.cnf
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppeakwell"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppeakwell"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: mysql-primary-config
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: peakwell
spec:
  selector:
    app: mysql
    db-role: active
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
