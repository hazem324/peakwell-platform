# ── AI: Risk/Booking ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ml
  namespace: peakwell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ml
  template:
    metadata:
      labels:
        app: ai-ml
    spec:
      containers:
        - name: ai-ml
          image: oussamaghalioun/peakwell-ai-ml:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-ml
  namespace: peakwell
spec:
  selector:
    app: ai-ml
  ports:
    - port: 8001
      targetPort: 8001
---
