apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: peakwell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup backend.peakwell.svc.cluster.local; do echo waiting for backend service; sleep 3; done']
      containers:
        - name: frontend
          image: oussamaghalioun/peakwell-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          # nginx inside this container proxies /peakwell/ → backend:8090
          # and /ai-events/ → ai-sport:8004 using K8s service DNS
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: peakwell
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
