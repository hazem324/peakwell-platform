apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-backup-pvc
  namespace: peakwell
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: peakwell
spec:
  schedule: "0 2 * * *"      # every night at 02:00 UTC
  concurrencyPolicy: Forbid   # skip if previous backup is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: mysql:8.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backup/peakwell_${TIMESTAMP}.sql.gz"

                  echo "Starting backup: $BACKUP_FILE"
                  mysqldump \
                    -h mysql \
                    -u root \
                    -p"${MYSQL_ROOT_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --all-databases \
                  | gzip > "$BACKUP_FILE"

                  echo "Backup complete: $(du -sh $BACKUP_FILE | cut -f1)"

                  # Keep only the last 7 days of backups
                  find /backup -name "peakwell_*.sql.gz" -mtime +7 -delete
                  echo "Cleanup done. Current backups:"
                  ls -lh /backup/peakwell_*.sql.gz
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: peakwell-secrets
                      key: MYSQL_ROOT_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mysql-backup-pvc
