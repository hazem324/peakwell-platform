<div class="attachment-upload-container">
  <div
    class="upload-zone"
    [class.drag-over]="dragOver"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)">

    <input
      type="file"
      id="file-input"
      class="file-input"
      (change)="onFileSelected($event)"
      accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.jpg,.jpeg,.png,.gif,.webp">

    <div class="upload-prompt">
      <span class="upload-icon">📎</span>
      <span class="upload-text">Drag and drop file here or</span>
      <label for="file-input" class="upload-link">click to select</label>
    </div>
    <div class="upload-hint">PDF, Office documents, text, or images (Max 10MB)</div>
  </div>

  <div *ngIf="uploading" class="upload-progress">
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="uploadProgress"></div>
    </div>
    <span class="progress-text">Uploading...</span>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
</div>
