<button class="save-btn" 
        [class.saved]="isSaved"
        (click)="toggleSave()" 
        [title]="getTooltip()"
        [disabled]="loading">
  <!-- Outline bookmark SVG when NOT saved -->
  <svg *ngIf="!isSaved" 
       xmlns="http://www.w3.org/2000/svg" 
       width="18" 
       height="18" 
       viewBox="0 0 24 24" 
       fill="none" 
       stroke="currentColor" 
       stroke-width="2" 
       stroke-linecap="round" 
       stroke-linejoin="round">
    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
  </svg>

  <!-- Filled bookmark SVG when saved -->
  <svg *ngIf="isSaved" 
       xmlns="http://www.w3.org/2000/svg" 
       width="18" 
       height="18" 
       viewBox="0 0 24 24" 
       fill="currentColor" 
       stroke="currentColor"
       stroke-width="2" 
       stroke-linecap="round" 
       stroke-linejoin="round">
    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
  </svg>
</button>
