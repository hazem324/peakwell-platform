<div class="chart-card feed-card">

  <div class="chart-header">
    <span class="chart-title">Recent Activity</span>
    <span class="chart-subtitle">last {{ data.length }} events</span>
  </div>

  <div class="feed">
    <div class="feed-item" *ngFor="let item of data">

      <div class="feed-icon" [style.background]="getAction(item.action).bg">
        <i [class]="getAction(item.action).icon"
           [style.color]="getAction(item.action).accent"></i>
      </div>

      <div class="feed-body">
        <div class="feed-top">
          <span class="feed-user">{{ item.userFullName }}</span>
          <span class="feed-status"
                [class.feed-status--ok]="item.status === 'SUCCESS'"
                [class.feed-status--fail]="item.status === 'FAILED'">
            {{ item.status }}
          </span>
        </div>
        <div class="feed-desc">{{ item.description }}</div>
        <div class="feed-meta">
          <span><i class="fa-solid fa-at"></i> {{ item.userEmail }}</span>
          <span><i class="fa-solid fa-location-dot"></i> {{ item.ipAddress }}</span>
          <span class="feed-time">{{ item.createdAt | date:'dd MMM, HH:mm' }}</span>
        </div>
      </div>

    </div>
  </div>

</div>
