<div class="captcha-wrap">

  <!-- Loading -->
  <div *ngIf="state === 'loading'" class="captcha-loading">
    Loading challenge…
  </div>

  <!-- Error loading -->
  <div *ngIf="state === 'error'" class="captcha-load-error">
    {{ errorMsg }}
    <button type="button" (click)="loadChallenge()">Retry</button>
  </div>

  <!-- Success state — replaced by green banner -->
  <div *ngIf="state === 'success'" class="captcha-verified">
    <span class="captcha-verified__icon">✓</span>
    Human verification passed
  </div>

  <!-- Grid (idle or verifying) -->
  <ng-container *ngIf="state === 'idle' || state === 'verifying'">

    <p class="captcha-instruction">
      Select all images showing a
      <strong>{{ challenge?.category }}</strong>
    </p>

    <div class="captcha-grid">
      <div
        *ngFor="let url of challenge?.imageUrls; let i = index"
        class="captcha-cell"
        [class.captcha-cell--selected]="isSelected(i)"
        [class.captcha-cell--disabled]="state === 'verifying'"
        (click)="toggle(i)"
      >
        <img [src]="url" [alt]="'captcha image ' + i" loading="lazy" />
        <span class="captcha-cell__check" *ngIf="isSelected(i)">✓</span>
      </div>
    </div>

    <div class="captcha-footer">
      <button
        type="button"
        class="captcha-btn--refresh"
        (click)="loadChallenge()"
        [disabled]="state === 'verifying'"
      >
        ↻ New challenge
      </button>

      <button
        type="button"
        class="captcha-btn--verify"
        (click)="verify()"
        [disabled]="selected.size === 0 || state === 'verifying'"
      >
        {{ state === 'verifying' ? 'Checking…' : 'Verify' }}
      </button>
    </div>

    <span class="captcha-error" *ngIf="errorMsg">{{ errorMsg }}</span>

  </ng-container>
</div>
