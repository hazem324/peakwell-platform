<div class="charts-page">
  <div class="charts-grid">

    <div class="chart-card">
      <div class="chart-card-header">
        <h4>⚖️ Weight Over Time</h4>
        <span class="chart-unit">kg</span>
      </div>
      <div class="chart-wrap">
        <canvas #weightChart></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <h4>📏 BMI Trend</h4>
        <span class="chart-unit">index</span>
      </div>
      <div class="chart-wrap">
        <canvas #bmiChart></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <h4>❤️ Blood Pressure</h4>
        <span class="chart-unit">mmHg</span>
      </div>
      <div class="chart-wrap">
        <canvas #bpChart></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <h4>🩸 Blood Glucose</h4>
        <span class="chart-unit">mg/dL</span>
      </div>
      <div class="chart-wrap">
        <canvas #glucoseChart></canvas>
      </div>
    </div>

  </div>
</div>
