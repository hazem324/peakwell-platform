<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-header"><h4>⚖️ Weight</h4><span>kg</span></div>
    <div class="chart-wrap"><canvas #weightCanvas></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-header"><h4>📏 BMI</h4><span>index</span></div>
    <div class="chart-wrap"><canvas #bmiCanvas></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-header"><h4>❤️ Blood Pressure</h4><span>mmHg</span></div>
    <div class="chart-wrap"><canvas #bpCanvas></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-header"><h4>🩸 Glucose</h4><span>mg/dL</span></div>
    <div class="chart-wrap"><canvas #glucoseCanvas></canvas></div>
  </div>
</div>
